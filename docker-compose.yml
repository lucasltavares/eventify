services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventify-app
    restart: unless-stopped
    ports:
      - "3000:8000"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - eventify-network

  vite:
    image: node:20
    container_name: eventify-vite
    restart: unless-stopped
    working_dir: /var/www/html
    command: npm run dev -- --host 0.0.0.0 --port 5174
    ports:
      - "5174:5174"
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/var/www/html
    networks:
      - eventify-network

networks:
  eventify-network:
    driver: bridge
